<div class="dashboard-content">
  <div class="table-container">
    <div class="table-header">
      <h4>👥 User & Volunteer Management</h4>
      <button class="view-all-btn" (click)="loadUsers()">🔄 Refresh List</button>
    </div>
    
    <div *ngIf="isLoading" style="padding: 20px; text-align: center;">
      ⏳ Loading users...
    </div>

    <table class="admin-table" *ngIf="!isLoading">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Current Role</th>
          <th>Change Role</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>#{{ user.id }}</td>
          <td><strong>{{ user.name }}</strong></td>
          <td>{{ user.email }}</td>
          <td>{{ user.phone }}</td>
          <td>
            <span class="status-badge" 
                  [ngStyle]="{
                    'background-color': user.role === 'ADMIN' ? '#e3f2fd' : (user.role === 'VOLUNTEER' ? '#fff3e0' : '#f5f5f5'),
                    'color': user.role === 'ADMIN' ? '#1976d2' : (user.role === 'VOLUNTEER' ? '#f57c00' : '#616161'),
                    'padding': '4px 8px', 'border-radius': '12px', 'font-weight': 'bold', 'font-size': '0.85em'
                  }">
              {{ user.role }}
            </span>
          </td>
          <td>
            <select [ngModel]="user.role" 
                    (change)="updateRole(user.id, $event)" 
                    style="padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
              <option value="USER">USER</option>
              <option value="VOLUNTEER">VOLUNTEER</option>
              <option value="DOCTOR">DOCTOR</option>
              <option value="ADMIN">ADMIN</option>
            </select>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
