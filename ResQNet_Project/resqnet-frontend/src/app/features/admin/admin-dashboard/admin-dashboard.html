<div class="dashboard-content">

  <div class="stats-grid">
    <div class="stat-card" *ngFor="let stat of stats" [style.border-bottom-color]="stat.color">
      <div class="stat-icon">{{ stat.icon }}</div>
      <div class="stat-info">
        <h3>{{ stat.value }}</h3>
        <p>{{ stat.title }}</p>
      </div>
    </div>
  </div>

  <div class="table-container">
    <div class="table-header">
      <h4>Recent SOS Requests</h4>
      <button class="view-all-btn">View All</button>
    </div>
    <table class="admin-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Sender Name</th>
          <th>Contact</th>
          <th>Location</th>
          <th>Time</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let sos of recentSos">
          <td>#{{ sos.id }}</td>
          <td>{{ sos.name }}</td>
          <td>{{ sos.phone }}</td>
          <td>{{ sos.location }}</td>
          <td>{{ sos.time }}</td>
          <td>
            <span class="status-badge"
              [ngStyle]="{'background-color': sos.status === 'ACTIVE' ? '#ffebee' : '#e8f5e9', 
                              'color': sos.status === 'ACTIVE' ? '#d32f2f' : '#2e7d32',
                              'padding': '4px 8px', 'border-radius': '12px', 'font-weight': 'bold', 'font-size': '0.85em'}">
              {{ sos.status }}
            </span>
          </td>
          <td>
            <button *ngIf="sos.status === 'ACTIVE'" class="action-btn" (click)="resolveSosAlert(sos.id)"
              style="background-color: #007bff; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer;">
              Resolve
            </button>
            <span *ngIf="sos.status === 'RESOLVED'" style="color: #666; font-weight: bold;">
              ✅ Done
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
