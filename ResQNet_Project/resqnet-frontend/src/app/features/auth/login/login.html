<div class="login-container">
  <div class="login-card">
    <h2>🚨 ResQNet</h2>
    <p class="subtitle">Disaster Response Network</p>

    <div class="error" *ngIf="error">{{ error }}</div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Enter email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Enter password" />
    </div>

    <button (click)="onLogin()" [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>

    <p class="register-link">
      No account? <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
