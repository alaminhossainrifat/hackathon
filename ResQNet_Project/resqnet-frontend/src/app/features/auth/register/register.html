<div class="register-container">
  <div class="register-card">
    <h2>🚨 ResQNet</h2>
    <p class="subtitle">Create Account</p>

    <div class="error" *ngIf="error">{{ error }}</div>
    <div class="success" *ngIf="success">{{ success }}</div>

    <div class="form-group">
      <label>Name</label>
      <input type="text" [(ngModel)]="name" placeholder="Enter name" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Enter email" />
    </div>

    <div class="form-group">
      <label>Phone</label>
      <input type="text" [(ngModel)]="phone" placeholder="01XXXXXXXXX" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Enter password" />
    </div>

    <button (click)="onRegister()" [disabled]="loading">
      {{ loading ? 'Registering...' : 'Register' }}
    </button>

    <p class="login-link">
      Already have account? <a routerLink="/login">Login</a>
    </p>
  </div>
</div>
